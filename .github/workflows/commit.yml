name: Daily Commit

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update README
        run: |
          echo "Last update: $(date)" >> log.txt

      - name: Commit changes
        run: |
          git config --global user.name "github-bot"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Daily automated commit"
          git push
